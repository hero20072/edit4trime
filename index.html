    function rgbToHsv(r, g, b) {
        r /= 255, g /= 255, b /= 255;
        let max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, v = max;
        let d = max - min;
        s = max === 0 ? 0 : d / max;
        if (max === min) { h = 0; } else {
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return [h * 360, s, v];
    }

    function hsvToRgb(h, s, v) {
        let r, g, b;
        let i = Math.floor((h / 360) * 6);
        let f = (h / 360) * 6 - i;
        let p = v * (1 - s);
        let q = v * (1 - f * s);
        let t = v * (1 - (1 - f) * s);
        switch (i % 6) {
            case 0: r = v, g = t, b = p; break;
            case 1: r = q, g = v, b = p; break;
            case 2: r = p, g = v, b = t; break;
            case 3: r = p, g = q, b = v; break;
            case 4: r = t, g = p, b = v; break;
            case 5: r = v, g = p, b = q; break;
        }
        return [Math.round(r * 255), Math.round(g * 255), Math.round(b * 255)];
    }

    function lerpHue(h1, h2, t) {
        let d = h2 - h1;
        if (h1 > h2 && h1 - h2 > 180) d = (h2 + 360) - h1;
        else if (h1 <= h2 && h2 - h1 > 180) d = (h2 - 360) - h1;
        return (h1 + d * t + 360) % 360;
    }
    function updateGradientPreview() {
        const steps = parseInt(document.getElementById('grad-steps').value);
        const previewBox = document.getElementById('grad-preview');
        if (!previewBox) return;
    
        previewBox.innerHTML = '';
        generatedColorsCache = [];

        const parse = (argb) => {
            const full = argb.replace('0x', '').padStart(8, 'F');
            return {
                a: parseInt(full.slice(0, 2), 16),
                r: parseInt(full.slice(2, 4), 16),
                g: parseInt(full.slice(4, 6), 16),
                b: parseInt(full.slice(6, 8), 16)
            };
        };

        const cStart = parse(currentGradStart);
        const cEnd = parse(currentGradEnd);

        for (let i = 0; i < steps; i++) {
            const t = i / (steps - 1); 
            let r, g, b, a;

            const interpolateHSV = (c1, c2, factor) => {
                const hsv1 = rgbToHsv(c1.r, c1.g, c1.b);
                const hsv2 = rgbToHsv(c2.r, c2.g, c2.b);
                const h = lerpHue(hsv1[0], hsv2[0], factor);
                const s = hsv1[1] + factor * (hsv2[1] - hsv1[1]);
                const v = hsv1[2] + factor * (hsv2[2] - hsv1[2]);
                const rgb = hsvToRgb(h, s, v);
                const a = Math.round(c1.a + factor * (c2.a - c1.a));
                return { r: rgb[0], g: rgb[1], b: rgb[2], a: a };
            };

            if (midEnabled) {
                const cMid = parse(currentGradMid);
                if (t <= 0.5) {
                    const res = interpolateHSV(cStart, cMid, t * 2);
                    r = res.r; g = res.g; b = res.b; a = res.a;
                } else {
                    const res = interpolateHSV(cMid, cEnd, (t - 0.5) * 2);
                    r = res.r; g = res.g; b = res.b; a = res.a;
                }
            } else {
                const res = interpolateHSV(cStart, cEnd, t);
                r = res.r; g = res.g; b = res.b; a = res.a;
            }
            
            const toHex = (n) => Math.max(0, Math.min(255, n)).toString(16).padStart(2, '0').toUpperCase();
            const argbStr = `0x${toHex(a)}${toHex(r)}${toHex(g)}${toHex(b)}`;
            generatedColorsCache.push(argbStr);

            const strip = document.createElement('div');
            strip.style.flex = "1";
            strip.style.height = "100%";
            strip.style.backgroundColor = `rgba(${r},${g},${b},${a/255})`;
            previewBox.appendChild(strip);
        }
    }

    function exportYAML(isFull = true) {
        let selectedKeys = [];
        if (!isFull) {
            const checkboxes = document.querySelectorAll('#partial-export-popup input[type="checkbox"]:checked');
            selectedKeys = Array.from(checkboxes).map(cb => cb.value);
            if (selectedKeys.length === 0) {
                alert("请至少勾选一个要导出的结构！");
                return;
            }
            document.getElementById('partial-export-popup').classList.add('hidden');
        }

        const out = {
            config_version: state.config_version,
            name: state.name,
            style: JSON.parse(JSON.stringify(state.style)),
            preedit: state.preedit,
            window: state.window,
            colors: state.colors, 
            preset_color_schemes: JSON.parse(JSON.stringify(state.preset_color_schemes)),
            fallback_colors: state._static.fallback_colors,
            liquid_keyboard: state._static.liquid_keyboard,
            tool_bar: state._static.tool_bar,
            preset_keys: state._static.preset_keys,
            preset_keyboards: state.preset_keyboards
        };

        if (state._static && state._static.style) Object.assign(out.style, state._static.style);

        const toTrimeFlow = (obj) => {
            const parts = Object.entries(obj).map(([k, v]) => {
                if (typeof v === 'string' && state.colors[v]) return `${k}: *${v}`;
                
                if (Array.isArray(v)) {
                    const arrStr = v.map(item => typeof item === 'string' ? `"${item.replace(/"/g, '\\"')}"` : item).join(', ');
                    return `${k}: [ ${arrStr} ]`;
                }

                if (v !== null && typeof v === 'object') {
                    return `${k}: ${toTrimeFlow(v)}`;
                }

                if (k === 'label' || typeof v === 'string') {
                    let s = String(v); 
                    if (s === '') return `${k}: ""`;
                    if (s === "'") return `${k}: "'"`;
                    return `${k}: "${s.replace(/"/g, '\\"')}"`;
                }
                
                if (k === 'width' || k === 'height') {
                    return `${k}: ${parseFloat(v)}`;
                }
                
                return `${k}: ${v}`;
            });
            return `{ ${parts.join(', ')} }`;
        };

        let res = [];

        if (isFull) {
            res.push(`config_version: "${out.config_version}"`);
            res.push(`name: ${out.name}`);
        }

        const simpleBlocks = { style: out.style, preedit: out.preedit, window: out.window };
        let filteredSimpleBlocks = {};
        ['style', 'preedit', 'window'].forEach(k => {
            if (isFull || selectedKeys.includes(k)) {
                filteredSimpleBlocks[k] = simpleBlocks[k];
            }
        });
        
        if (Object.keys(filteredSimpleBlocks).length > 0) {
            res.push(jsyaml.dump(filteredSimpleBlocks, { indent: 2, lineWidth: -1 }));
        }

        if (isFull || selectedKeys.includes('colors')) {
            res.push("colors:");
            Object.entries(out.colors).forEach(([id, val]) => {
                res.push(`  ${id}: &${id} ${val}`);
            });
        }

        if (isFull || selectedKeys.includes('preset_color_schemes')) {
            res.push("\npreset_color_schemes:");
            Object.entries(out.preset_color_schemes).forEach(([id, scheme]) => {
                res.push(`  ${id}:`);
                Object.entries(scheme).forEach(([k, v]) => {
                    if (typeof v === 'string' && out.colors[v]) {
                        res.push(`    ${k}: *${v}`);
                    } else {
                        res.push(`    ${k}: ${v}`);
                    }
                });
            });
        }

        if (isFull || selectedKeys.includes('preset_keys')) {
            res.push("\npreset_keys:");
            Object.entries(out.preset_keys).forEach(([id, cfg]) => {
                res.push(`  ${id}: ${toTrimeFlow(cfg)}`);
            });
        }

        if (isFull || selectedKeys.includes('preset_keyboards')) {
            res.push("\npreset_keyboards:");
            Object.keys(out.preset_keyboards).forEach(kbId => {
                const kb = out.preset_keyboards[kbId];
                res.push(`  ${kbId}:`);
                res.push(`    name: ${kb.name || ''}`);
                res.push(`    width: ${kb.width || 10}`);
                res.push(`    ascii_mode: ${kb.ascii_mode !== undefined ? kb.ascii_mode : 0}`);
                res.push(`    keys:`);
                kb.keys.forEach(key => {
                    res.push(`      - ${toTrimeFlow(key)}`);
                });
            });
        }

        if (out.fallback_colors && (isFull || selectedKeys.includes('fallback_colors'))) {
            res.push(`\nfallback_colors:`);
            Object.entries(out.fallback_colors).forEach(([k, v]) => res.push(`  ${k}: ${v}`));
        }
        
        if (out.liquid_keyboard && (isFull || selectedKeys.includes('liquid_keyboard'))) {
            const liquidBlock = jsyaml.dump({ liquid_keyboard: out.liquid_keyboard }, { 
                indent: 2, 
                lineWidth: -1 
            });
            res.push("\n" + liquidBlock); 
        }

        if (out.tool_bar && (isFull || selectedKeys.includes('tool_bar'))) {
            res.push("\ntool_bar:");
            res.push(`  button_spacing: ${out.tool_bar.button_spacing}`);
            res.push(`  button_font: ${out.tool_bar.button_font}`);
            res.push(`  primary_button: ${toTrimeFlow(out.tool_bar.primary_button)}`);
            
            const buttonKeys = [
                'hide_button', 'emoji_button', 'clipboard_button', 
                'edit_button', 'ascii_mode_button', 'full_shape_button'
            ];
            
            buttonKeys.forEach(k => {
                if (out.tool_bar[k]) {
                    res.push(`  ${k}: &${k} ${toTrimeFlow(out.tool_bar[k])}`);
                }
            });

            res.push(`  buttons:`);
            buttonKeys.forEach(k => {
                if (out.tool_bar[k]) {
                    res.push(`    - *${k}`);
                }
            });
        }

        const finalYaml = res.join('\n');
        const blob = new Blob([finalYaml], { type: 'text/yaml;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        
        const timeStr = getFormattedTime();
        a.download = isFull ? `${timeStr}.trime.yaml` : `部分_${timeStr}.trime.yaml`;
        
        a.click();
    }

    function flattenStyleJS() {
        return STYLE_KEYS.map(key => {
            let val;
            if (key.startsWith("preedit_")) {
                const sub = key.substring(8);
                if (sub === "horizontal_padding") val = state.preedit?.horizontal_padding;
                else if (sub === "alpha") val = state.preedit?.alpha;
                else if (sub === "top_end_radius") val = state.preedit?.top_end_radius;
                else if (sub === "foreground_font_size") val = state.preedit?.foreground?.font_size;
            } else if (key.startsWith("window_")) {
                const win = state.window || {};
                if (key.includes("insets_vertical")) val = win.insets?.vertical;
                else if (key.includes("insets_horizontal")) val = win.insets?.horizontal;
                else if (key.includes("item_padding_vertical")) val = win.item_padding?.vertical;
                else if (key.includes("item_padding_horizontal")) val = win.item_padding?.horizontal;
                else if (key.includes("foreground_text_font_size")) val = win.foreground?.text_font_size;
                else if (key.includes("foreground_label_font_size")) val = win.foreground?.label_font_size;
                else if (key.includes("foreground_comment_font_size")) val = win.foreground?.comment_font_size;
                else {
                    const sub = key.substring(7);
                    val = win[sub];
                }
            } else if (key === "enter_label_mode") {
                val = state._static?.style?.enter_label_mode;
            } else {
                val = state.style[key];
            }
            return (val !== undefined && val !== null) ? val : 0;
        });

    function processColorsJS() {
        COLOR_VALUE_TO_INDEX = {};
        const cList = [];
        
        const sortedKeys = Object.keys(state.colors).sort((a, b) => {
            const numA = parseInt(a.replace(/\D/g, '')) || 0;
            const numB = parseInt(b.replace(/\D/g, '')) || 0;

        });

        sortedKeys.forEach((k, idx) => {
            let val = state.colors[k];
            let hexStr = "00000000";
            if (typeof val === 'number') {
                if (val < 0) val = val >>> 0; // 转为无符号
                hexStr = val.toString(16).padStart(8, '0');
            } else if (typeof val === 'string') {
                const match = val.match(/0x([0-9a-fA-F]+)/i);
                if (match) {
                    hexStr = match[1].toLowerCase();
                } else if (val.startsWith('#')) {
                    hexStr = "ff" + val.substring(1).toLowerCase();
                }
            }
            cList.push(hexStr);
            const valInt = parseInt(hexStr, 16);
            if (!(valInt in COLOR_VALUE_TO_INDEX)) {
                COLOR_VALUE_TO_INDEX[valInt] = idx + 1;
            }
        });
        return cList;
    }

    function minifyMapJS(data) {
        if (Array.isArray(data)) {
            return data.map(item => minifyMapJS(item));
        } else if (data !== null && typeof data === 'object') {
            const newDict = {};
            for (let k in data) {
                let v = data[k];
                let shortK = SHORT_KEYS_MAPPING[k] || k;

                if (k.includes("color") && (v === 0 || v === "0" || v === 0.0)) {
                    v = "@1";
                } 
                else if (typeof v === 'string' && v.startsWith("color") && state.colors[v]) {
                    const idx = v.replace("color", "");
                    if (k.endsWith("_color") || /^(b|t)(h[1-4]|bs|kg|enter|nk)$/.test(k)) {
                        v = "@" + idx;
                    } else {
                        v = "*color" + idx;
                    }
                }
                else if (typeof v === 'string' && v.startsWith("*color")) {
                    const idx = v.replace("*color", "");
                    if (k.endsWith("_color") || /^(b|t)(h[1-4]|bs|kg|enter|nk)$/.test(k)) {
                        v = "@" + idx;
                    } else {
                        v = "*color" + idx;
                    }
                }
                else if (typeof v === 'number' || (typeof v === 'string' && v.startsWith('0x'))) {
                    let num = typeof v === 'number' ? v : parseInt(v, 16);
                    if (num < 0) num = num >>> 0;
                    if (num in COLOR_VALUE_TO_INDEX) {
                        v = "@" + COLOR_VALUE_TO_INDEX[num];
                    }
                }
                newDict[shortK] = minifyMapJS(v);
            }
            return newDict;
        }
        return data;
    }

    function uint8ArrayToBase64(uint8Array) {
        let binary = '';
        const len = uint8Array.byteLength;
        for (let i = 0; i < len; i++) {
            binary += String.fromCharCode(uint8Array[i]);
        }
        return btoa(binary);
    }

    let qrIsGenerated = false;
    let qrHoverTimer = null;

    function handleQRButtonClick() {
        const colorsList = processColorsJS();
        const payload = {
            s: flattenStyleJS(),
            c: colorsList,
            p: minifyMapJS(state.preset_color_schemes),
            k: minifyMapJS(state.preset_keyboards)
        };

        const jsonStr = JSON.stringify(payload);
        
        const deflated = pako.deflate(jsonStr, { level: 9 });
        const b64Str = uint8ArrayToBase64(deflated);

        const qrContainer = document.getElementById('qr-container');
        qrContainer.innerHTML = ''; 
        
        new QRCode(qrContainer, {
            text: b64Str,
            width: 750,
            height: 750,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.L
        });

        document.getElementById('qr-size-info').innerText = `原始JSON长度: ${jsonStr.length} 字符 | 压缩Base64长度: ${b64Str.length} 字符`;

        document.getElementById('qr-overlay').classList.remove('hidden');

        qrIsGenerated = true;
        const btn = document.getElementById('qr-export-btn');
        btn.classList.remove('bg-blue-600');
        btn.classList.add('bg-emerald-600');
        btn.innerText = '✅ 扫码同步';
    }

    function togglePayPopup() {
        const popup = document.getElementById('pay-popup');
        popup.classList.toggle('hidden');
    }
    
    let hasAutoShownPay = false;
    setTimeout(() => {
        const popup = document.getElementById('pay-popup');
        if (!hasAutoShownPay && popup && popup.classList.contains('hidden')) {
            popup.classList.remove('hidden');
            hasAutoShownPay = true;
        }
    }, 25000);
    
    document.addEventListener('mousedown', function(e) {
        const popup = document.getElementById('pay-popup');
        const btn = document.getElementById('pay-toggle-btn');
        if (popup && !popup.classList.contains('hidden')) {
            if (!popup.contains(e.target) && e.target !== btn) {
                popup.classList.add('hidden');
            }
        }
    });

    document.addEventListener("DOMContentLoaded", () => {
        const qrBtn = document.getElementById('qr-export-btn');
        
        qrBtn.addEventListener('click', handleQRButtonClick);

        qrBtn.addEventListener('mouseenter', () => {
            if (!qrIsGenerated) return; 
            qrHoverTimer = setTimeout(() => {
                document.getElementById('qr-overlay').classList.remove('hidden');
            }, 2000); 
        });

        qrBtn.addEventListener('mouseleave', () => {
            if (qrHoverTimer) {
                clearTimeout(qrHoverTimer);
                qrHoverTimer = null;
            }
        });
    });

    window.onload = () => { 
        extractCustomMappings();
        switchTab('layout'); 
        updateCssEngine(); 

        const popupBtn = document.getElementById('global-popup-btn');
        if (popupBtn) {
            isGlobalPopupEnabled = true;
            popupBtn.classList.remove('bg-slate-800', 'text-slate-500', 'border-slate-700');
            popupBtn.classList.add('bg-emerald-600', 'text-white', 'border-slate-500/30');
            popupBtn.innerText = '😁 气泡预览';
            popupBtn.style.boxShadow = '0 0 10px rgba(16,185,129,0.2)';
        }

        const winBtn = document.getElementById('win-mode-btn');
        if (winBtn) {
            isWindowMode = false;
            winBtn.classList.remove('bg-blue-600', 'text-white', 'border-slate-500');
            winBtn.classList.add('bg-slate-800', 'text-slate-500', 'border-slate-500/30');
            winBtn.innerText = '🤞 悬浮候选';
            winBtn.style.boxShadow = 'none';
        }

        const importInput = document.getElementById('importFile');
        if (importInput) {
            importInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const yamlText = event.target.result;
                        const imported = jsyaml.load(yamlText);

                        if (!imported || !imported.preset_keyboards) {
                            alert("无效的配置文件：未发现 preset_keyboards 结构。");
                            return;
                        }

                        if (imported.colors) {
                            Object.keys(imported.colors).forEach(id => {
                                let val = imported.colors[id];
                                if (typeof val === 'number') {
                                    imported.colors[id] = '0x' + val.toString(16).toUpperCase().padStart(8, '0');
                                }
                            });
                            state.colors = imported.colors;
                        }

                        state.config_version = imported.config_version || "3.0";
                        state.name = imported.name || "未命名导入";
                        
                        if (imported.style) state.style = Object.assign({}, state.style, imported.style);
                        if (imported.preedit) state.preedit = Object.assign({}, state.preedit, imported.preedit);
                        if (imported.window) state.window = Object.assign({}, state.window, imported.window);
                        
                        if (imported.colors) {
                            state.colors = imported.colors;
                        }

                        if (imported.liquid_keyboard) state._static.liquid_keyboard = imported.liquid_keyboard;
                        if (imported.preset_keys) state._static.preset_keys = imported.preset_keys;
                        if (imported.fallback_colors) state._static.fallback_colors = imported.fallback_colors;

                        if (imported.preset_color_schemes) state.preset_color_schemes = imported.preset_color_schemes;
                        if (imported.preset_keyboards) state.preset_keyboards = imported.preset_keyboards;


                        
                        Object.values(state.preset_color_schemes).forEach(scheme => {
                            Object.keys(scheme).forEach(key => {
                                let val = scheme[key];
                                let hexStr = (typeof val === 'number') ? 
                                    '0x' + val.toString(16).toUpperCase().padStart(8, '0') : String(val);
                                
                                const match = Object.entries(state.colors).find(([cid, cval]) => 
                                    cval.toLowerCase() === hexStr.toLowerCase()
                                );
                                if (match) scheme[key] = match[0]; 
                            });
                        });

                        currentScheme = Object.keys(state.preset_color_schemes)[0] || "default";
                        currentLayout = Object.keys(state.preset_keyboards)[0] || "default";
                        selectedKeyIdx = null;

                        updateCssEngine();
                        if (currentTab === 'general') renderGeneralEditor();
                        else if (currentTab === 'appearance') renderAppearanceEditor();
                        else renderLayoutEditor();
                        renderGlobalKeyboard();

                        addChatMessage('left', `✅ 导入成功！已识别方案：${Object.keys(state.preset_color_schemes).length}个，键盘：${Object.keys(state.preset_keyboards).length}个。`);
                        
                        importInput.value = '';

                    } catch (err) {
                        console.error(err);
                        document.getElementById('import-error-popup').classList.remove('hidden');
                        importInput.value = '';
                    }
                };
                reader.readAsText(file);
            };
        }
    };


    let pickedColors = [];                 
    let currentImageCanvas = null;        
    let magnifierCanvas = null;          
    let magnifierCtx = null;             
    const MAGNIFIER_SIZE = 120;         
    const ZOOM_FACTOR = 4;               

    function toggleColorPicker() {
        const btn = document.getElementById('color-picker-btn');
        const panel = document.getElementById('color-picker-panel');
        if (!btn || !panel) return;

        const isHidden = panel.classList.contains('hidden');
        if (isHidden) {
            const rect = btn.getBoundingClientRect();
            const panelWidth = 320; // w-80 = 320px
            let left = rect.left;
            const maxLeft = window.innerWidth - panelWidth - 10;
            if (left > maxLeft) left = maxLeft;
            if (left < 10) left = 10;
            panel.style.top = rect.bottom + 'px';
            panel.style.left = left + 'px';

            panel.classList.remove('hidden');
            btn.classList.remove('bg-slate-800', 'text-slate-500', 'border-slate-500/30');
            btn.classList.add('bg-yellow-600', 'text-white', 'border-yellow-500');
            btn.innerText = '🎊 上传取色';
        } else {
            panel.classList.add('hidden');
            btn.classList.remove('bg-yellow-600', 'text-white', 'border-yellow-500');
            btn.classList.add('bg-slate-800', 'text-slate-500', 'border-slate-500/30');
            btn.innerText = '🖼️ 上传取色';
        }
    }

    // 处理图片上传
    function handleImageUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('color-canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, img.width, img.height);
                canvas.style.display = 'block';
                currentImageCanvas = canvas;

                pickedColors = [];
                renderColorSwatches();
                canvas.onclick = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;

                    const x = (e.clientX - rect.left) * scaleX;
                    const y = (e.clientY - rect.top) * scaleY;

                    if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return;

                    const pixel = ctx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
                    const r = pixel[0], g = pixel[1], b = pixel[2];
                    const hex = '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('').toUpperCase();
                    pickedColors.push(hex);
                    renderColorSwatches();
                };
                magnifierCanvas = document.getElementById('magnifier-canvas');
                    if (magnifierCanvas) {
                        magnifierCtx = magnifierCanvas.getContext('2d');
                        canvas.addEventListener('mouseenter', () => {
                            magnifierCanvas.style.display = 'block';
                        });
                        canvas.addEventListener('mousemove', (e) => updateMagnifier(e, canvas, ctx));
                        canvas.addEventListener('mouseleave', () => {
                            magnifierCanvas.style.display = 'none';
                        });
                    }

            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function renderColorSwatches() {
        const container = document.getElementById('color-swatches');
        if (!container) return;
        container.innerHTML = '';
        pickedColors.forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = 'flex items-center gap-1 p-1 bg-slate-800 rounded border border-slate-600 cursor-pointer hover:border-yellow-500';
            swatch.setAttribute('data-color', color);   
            swatch.innerHTML = `
                <div class="w-5 h-5 rounded" style="background-color: ${color};"></div>
                <span class="text-xs font-mono text-slate-300">${color}</span>
            `;
            swatch.onclick = (e) => {
                e.stopPropagation();
                copyColorCode(color);
            };
            container.appendChild(swatch);
        });
    }
    function copyColorCode(color) {
        navigator.clipboard.writeText(color).then(() => {

        });
    }

    function clearPickedColors() {
        pickedColors = [];
        renderColorSwatches();
    }

    function addAllPickedColors() {
        if (!pickedColors || pickedColors.length === 0) {
            alert("没有色块可导入，请先点击图片取色。");
            return;
        }

        let x = 1;
        while (state.colors[`color${x}`]) {
            x++;
        }

        let count = 0;

        pickedColors.forEach(hex => {
            if (!hex || !hex.startsWith('#')) return;

            const rawHex = hex.replace('#', '').toUpperCase();
            const argb = '0xFF' + rawHex;

            state.colors[`color${x}`] = argb;
            
            x++; 
            count++;
        });

        updateCssEngine();   
        renderLayoutEditor(); 
        setTimeout(() => {
            const container = document.getElementById('palette-container');
            if (container) container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }, 100);

        clearPickedColors();
    }

    function updateMagnifier(event, sourceCanvas, sourceCtx) {
        if (!magnifierCanvas || !sourceCanvas) return;

        if (magnifierCanvas.width !== MAGNIFIER_SIZE) {
            magnifierCanvas.width = MAGNIFIER_SIZE;
            magnifierCanvas.height = MAGNIFIER_SIZE;
        }

        const rect = sourceCanvas.getBoundingClientRect();

        const mouseX = event.clientX - rect.left;
        const mouseY = event.clientY - rect.top;

        const scaleX = sourceCanvas.width / rect.width;
        const scaleY = sourceCanvas.height / rect.height;
        const pixelX = mouseX * scaleX;
        const pixelY = mouseY * scaleY;

        magnifierCtx.clearRect(0, 0, MAGNIFIER_SIZE, MAGNIFIER_SIZE);
        magnifierCtx.fillStyle = '#020617';
        magnifierCtx.fillRect(0, 0, MAGNIFIER_SIZE, MAGNIFIER_SIZE);
        
        magnifierCtx.imageSmoothingEnabled = false;

        magnifierCtx.save();
        
        magnifierCtx.translate(MAGNIFIER_SIZE / 2, MAGNIFIER_SIZE / 2); 
        
        magnifierCtx.scale(ZOOM_FACTOR, ZOOM_FACTOR); 
       
        magnifierCtx.translate(-pixelX, -pixelY); 
        
        magnifierCtx.drawImage(sourceCanvas, 0, 0);
        magnifierCtx.restore();

        const center = MAGNIFIER_SIZE / 2;
            
        magnifierCtx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
        magnifierCtx.lineWidth = 1;
        magnifierCtx.beginPath();
        magnifierCtx.moveTo(center - 7, center);
        magnifierCtx.lineTo(center - 5, center);
        magnifierCtx.moveTo(center + 5, center);
        magnifierCtx.lineTo(center + 7, center);
        magnifierCtx.moveTo(center, center - 7);
        magnifierCtx.lineTo(center, center - 5);
        magnifierCtx.moveTo(center, center + 5);
        magnifierCtx.lineTo(center, center + 7);
        magnifierCtx.stroke();

        magnifierCtx.beginPath();
        magnifierCtx.arc(center, center, 2.5, 0, 2 * Math.PI);
        magnifierCtx.fillStyle = '#ef4444'; // 红色
        magnifierCtx.fill();
        magnifierCtx.lineWidth = 1.5;
        magnifierCtx.strokeStyle = '#ffffff';
        magnifierCtx.stroke();

        const magnifierLeft = mouseX - MAGNIFIER_SIZE / 2;
        const magnifierTop = mouseY - MAGNIFIER_SIZE - 15; 

        magnifierCanvas.style.left = magnifierLeft + 'px';
        magnifierCanvas.style.top = magnifierTop + 'px';
    }


    document.addEventListener('click', function(e) {
        const panel = document.getElementById('key-editor-panel');
            if (panel && panel.style.display !== 'none') {
                if (panel.contains(e.target)) {
                    return;
                }
                panel.style.display = 'none';
                selectedKeyIdx = null;
                renderGlobalKeyboard();
            }
        const popup = document.getElementById('mapping-popup');
            if (popup && popup.style.display !== 'none' && !popup.contains(e.target)) {
                popup.style.display = 'none';
            }
        const colorUpload = document.getElementById('image-upload');
            if (colorUpload) {
                colorUpload.addEventListener('change', handleImageUpload);
            }
        
            const partialPopup = document.getElementById('partial-export-popup');
        const partialBtn = document.querySelector('button[onclick="togglePartialExportPopup()"]');
        if (partialPopup && !partialPopup.classList.contains('hidden')) {
            if (!partialPopup.contains(e.target) && e.target !== partialBtn) {
                partialPopup.classList.add('hidden');
            }
        }
    });
    
</script>
